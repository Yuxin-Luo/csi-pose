# Link matrix convention: H[i, j] = (rx_i, tx_j) — fixed from firmware to tensor
# Usage: copy this file as boards.yaml and replace with measured values
#   - com: COM port per board, found in Device Manager
#   - mac: mac field from console HELLO response after flashing
# Note: CH340-type devices have no serial number, so COM is tied to USB physical port —
#   fix cable/hub port location and verify board↔COM mapping; recommend labeling boards
boards:
  - {id: tx0, role: tx, idx: 0, com: COM1, mac: "XX:XX:XX:XX:XX:01"}
  - {id: tx1, role: tx, idx: 1, com: COM2, mac: "XX:XX:XX:XX:XX:02"}
  - {id: tx2, role: tx, idx: 2, com: COM3, mac: "XX:XX:XX:XX:XX:03"}
  - {id: rx0, role: rx, idx: 0, com: COM4, mac: "XX:XX:XX:XX:XX:04"}
  - {id: rx1, role: rx, idx: 1, com: COM5, mac: "XX:XX:XX:XX:XX:05"}
  - {id: rx2, role: rx, idx: 2, com: COM6, mac: "XX:XX:XX:XX:XX:06"}
camera: {id: cam0, mount: "0.65~0.95m behind RX cluster", height_cm: 150}
