# rt live — WSL relay path (NAT) variant. Difference from original rt.yaml is only settle_ms.
# rt 라이브 — WSL 중계 경로(NAT) variant. 정본 rt.yaml과의 차이는 settle_ms 단 하나.
#
# Background (06-12 measurement): Windows mosquitto is localhost-only + firewall blocks WSL inbound
# → Live receives via 2-hop relay: mosquitto → tools/mqtt_pump_wsl.py → WSL amqtt.
# Bridge chunk (~105ms period) + relay delay causes cutoff time t̂ to lead (tail_lead) p50 4ms / p5 −37ms.
# With settle 30ms (direct USB batching baseline) window is incomplete at cutoff → valid 0%.
# With settle 200ms cutoff is delayed to absorb (measured: chunk 105 + relay ~40 + margin).
# When returning to direct connection (mirrored networking or Windows standalone), use rt.yaml instead.
# (Original Korean: 브리지 청크(~105ms 주기) + 중계 지연으로 절단 시점 t̂ 선행(tail_lead) p50 4ms /)
# (Original Korean: p5 −37ms — settle 30ms(직결 USB 배칭 기준)로는 윈도가 미완성 절단되어 valid 0%.)
# (Original Korean: settle 200ms로 절단을 늦춰 흡수(실측 후 산정: 청크 105 + 중계 ~40 + 여유).)
# (Original Korean: 직결(mirrored networking 또는 Windows 단독) 복귀 시 이 파일 대신 rt.yaml 사용.)
tau_presence: 0.3        # presence gate mean(ĉ)<τ → absent. Provisional before calibration — recalibrate with M2 S00 distribution
ema_alpha: 0.5           # §11 EMA smoothing
settle_ms: 200           # ← ONLY difference from rt.yaml(30) — absorb relay path delay
motion_window_s: 0.5     # Model-free motion energy (link mean amplitude std) window
fall:                    # §10 — all provisional before calibration (calibrated only with round-1 falls)
  theta_v: 0.4           # R1: hip y regression slope threshold — calibrated with fall-demo-01 measurement
  aspect_hi: 1.2         # R2: upright judgment (core bbox h/w in pixel space — same as pck §9)
  aspect_lo: 1.0         # R2: lying judgment — calibrated with fall-demo-01 measurement (post-landing 0.54~1.25, rt-handoff-20260612)
  transition_s: 1.5      # R2: upright→lying transition allowed window
  grace_s: 1.5           # absent grace — preserve history/IMPACT during momentary ĉ drop
  head_y: 0.7            # R3: head(nose) y enters lower 30%
  confirm_s: 2.0         # IMPACT→ALARM confirmation maintenance window
  lying_ratio: 0.7       # Lower limit of lying frame ratio within maintenance window
  theta_still: 0.02      # Upper limit of pose frame-to-frame movement RMS within maintenance window (normalized)
  # CSI motion energy upper bound — ≤0 = uncalibrated (skip CSI condition + warn once).
  # See rt.yaml comments for details.
  theta_csi_still: 0.0   # CSI motion energy upper bound — ≤0 = uncalibrated (skip CSI condition + warn once)
  refractory_s: 10.0     # Refractory after ALARM
  release_hip_y: 0.6     # Release: hip y upper bound for standing recovery
  release_hold_s: 1.0    # Release: standing maintenance duration
  absent_release_s: 5.0  # Release: absent sustained (departure)
mqtt:
  host: localhost        # WSL side amqtt relay broker (tools/mqtt_pump_wsl.py docking)
  port: 1883
